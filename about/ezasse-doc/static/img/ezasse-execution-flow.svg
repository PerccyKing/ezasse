<svg width="800" height="1000" viewBox="0 0 800 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="1000" fill="#F8FAFC"/>
  
  <!-- Definitions for arrows -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748B" />
    </marker>
    <filter id="shadow" x="0" y="0" width="100%" height="100%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="400" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#1E293B">Ezasse 执行逻辑流程图</text>

  <!-- Step 1: User Files -->
  <rect x="250" y="100" width="300" height="70" rx="8" fill="#3B82F6" filter="url(#shadow)"/>
  <text x="400" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">用户配置文件</text>
  <text x="400" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">(.sql, .yaml, .properties)</text>
  
  <!-- Arrow -->
  <line x1="400" y1="170" x2="400" y2="210" stroke="#64748B" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 2: Starter/Startup -->
  <rect x="250" y="210" width="300" height="60" rx="8" fill="#0EA5E9" filter="url(#shadow)"/>
  <text x="400" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">Spring Boot Starter / 启动</text>
  
  <!-- Arrow -->
  <line x1="400" y1="270" x2="400" y2="310" stroke="#64748B" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 3: Resource Loading -->
  <rect x="250" y="310" width="300" height="70" rx="8" fill="#8B5CF6" filter="url(#shadow)"/>
  <text x="400" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">Resource Loader (扫描)</text>
  <text x="400" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">使用 ClassGraph 扫描配置文件夹</text>

  <!-- Arrow -->
  <line x1="400" y1="380" x2="400" y2="420" stroke="#64748B" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 4: Parsing -->
  <rect x="250" y="420" width="300" height="70" rx="8" fill="#A855F7" filter="url(#shadow)"/>
  <text x="400" y="450" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">Line Parser (解析)</text>
  <text x="400" y="470" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">解析为指令行与执行内容</text>

  <!-- Arrow -->
  <line x1="400" y1="490" x2="400" y2="530" stroke="#64748B" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Loop Start Box -->
  <rect x="150" y="530" width="500" height="430" rx="12" stroke="#E2E8F0" stroke-width="2" stroke-dasharray="8 4" fill="white" fill-opacity="0.5"/>
  <text x="170" y="555" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#94A3B8">执行引擎 (循环遍历每一行)</text>

  <!-- Step 5: Checker -->
  <rect x="250" y="570" width="300" height="60" rx="8" fill="#10B981" filter="url(#shadow)"/>
  <text x="400" y="605" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">EzasseChecker (校验)</text>

  <!-- Decision -->
  <path d="M 400 660 L 440 700 L 400 740 L 360 700 Z" fill="#64748B" filter="url(#shadow)"/>
  <text x="400" y="705" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">通过?</text>
  
  <line x1="400" y1="630" x2="400" y2="660" stroke="#64748B" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Arrow to Executor -->
  <line x1="400" y1="740" x2="400" y2="780" stroke="#10B981" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="410" y="765" font-family="Arial, sans-serif" font-size="12" fill="#10B981" font-weight="bold">YES</text>

  <!-- Arrow Skip -->
  <path d="M 440 700 L 600 700 L 600 550 L 550 550" fill="none" stroke="#EF4444" stroke-width="2" stroke-dasharray="4" marker-end="url(#arrowhead)"/>
  <text x="520" y="690" font-family="Arial, sans-serif" font-size="12" fill="#EF4444" font-weight="bold">NO (跳过)</text>

  <!-- Step 6: Executor Route -->
  <rect x="250" y="780" width="300" height="60" rx="8" fill="#F59E0B" filter="url(#shadow)"/>
  <text x="400" y="815" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">Executor 路由分发</text>

  <!-- Arrow -->
  <line x1="400" y1="840" x2="400" y2="880" stroke="#64748B" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 7: Action -->
  <rect x="250" y="880" width="300" height="60" rx="8" fill="#F43F5E" filter="url(#shadow)"/>
  <text x="400" y="915" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">EzasseExecutorAction (执行)</text>

  <!-- Loop back arrow -->
  <path d="M 250 910 L 100 910 L 100 550 L 150 550" fill="none" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="110" y="730" font-family="Arial, sans-serif" font-size="12" fill="#94A3B8" transform="rotate(-90 110 730)">处理下一行</text>

</svg>